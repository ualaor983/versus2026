spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
versus.seed.enabled=false

# ── Flyway ───────────────────────────────────────────────────────────────────
# El esquema lo gestionan exclusivamente las migraciones de db/migration.
# Hibernate solo valida (ddl-auto=validate), nunca modifica tablas.
spring.flyway.enabled=true
# Permite adoptar Flyway sobre una BD de producción ya existente: si el esquema
# no está vacío y no hay historial de Flyway, se marca una baseline (V1) en vez
# de fallar. En una BD vacía, V1 se aplica con normalidad.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=initial_schema
